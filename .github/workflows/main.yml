name: CI
permissions:
  contents: read 
  pull-requests: write
  
on:
 ## push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: ls -alh /home
      - run: ls -alh /home/runner 
      - run: echo $PATH
      - run: pwd
      - run: go version

      - run: |
          ls -alh
          
      - run: |
          cd cmd/install 
          go mod tidy
          go run main.go

      - run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o ./install_mise install_mise.go
      - run: ./install_mise
      
      - run: ls -alh /home/runner/.local/share/mise/installs
      - run: |
          ls -alh /home/runner/.local/share/mise/installs/terraform 
          echo verif1
          ls -alh /home/runner/.local/share/mise/installs/aqua-arttor-helmify
          echo verif3 
          ls -alh /home/runner/.local/share/mise/installs/http-dockerizer
      - run: |
          echo start
          eval "$(mise activate bash)"
          terraform version
          dockerizer version
 
      - run: |
          echo v2
          cd cmd/install
          go run Test2.go
        
      - run: ls -alh /home/runner/.local/bin
      - run: |
         mkdir exec
         cp cmd/install/Test2.go exec/main.go
         cp cmd/install/config.json exec
         cp cmd/install/go.mod exec
         cd exec
         ls -alh
         dockerizer plan
         echo detect
         dockerizer detect
         dockerizer
         echo 'Voici le dockerfile'
         cat Dockerfile 
         echo 'voici docker compose'
         cat docker-compose.yml
         
      - name: test exécution
        run: k3s --version

  build-dockerizer:
    runs-on: ubuntu-latest
    steps:
      - name: build dockerizer 
        run: |
          git clone https://github.com/dublyo/dockerizer
          cd dockerizer
          mkdir dockerizer-musl
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o ./dockerizer-musl/dockerizer ./cmd/dockerizer
          ./dockerizer-musl/dockerizer help
          
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: my-artifact
          path: ./dockerizer/dockerizer-musl/dockerizer
    
  build-install_mise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          sparse-checkout: |
            install_mise.go
            Install.json
            go.mod
          sparse-checkout-cone-mode: false
          
      - run: ls -alh
      - run: rm -r Install.json cmd
      
      - run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o ./install_mise install_mise.go
      - run: ./install_mise

      - run: |
          sed -i '26i COPY install_mise.go .' Dockerfile
          sed -i '27i COPY go.mod .' Dockerfile              
      - run: |
         echo 'Voici le dockerfile'
         cat Dockerfile 
         echo 'voici docker compose'
         cat docker-compose.yml

      - run: docker build -t apps .
      - run: docker run apps
      
      - run: ls -alh /home/runner/.local/share/mise/installs
      - run: |
          ls -alh /home/runner/.local/share/mise/installs/http-dockerizer
      - run: |
          echo start
          eval "$(mise activate bash --shims)"
          dockerizer version

  build-test2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: build
        run: |
          cd cmd/install
          go build Test2.go
      - run: |
          cd cmd/install
          ./Test2
        
      - run: ls -alh /home/runner/.local/bin
      - run: |
         mkdir exec
         cp cmd/install/Test2.go exec/main.go
         cp cmd/install/config.json exec
         cp cmd/install/go.mod exec
         cd exec
         ls -alh
         dockerizer plan
         echo detect
         dockerizer detect
         dockerizer
         echo 'Voici le dockerfile'
         cat Dockerfile 
         echo 'voici docker compose'
         cat docker-compose.yml
