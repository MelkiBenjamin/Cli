name: renovate
permissions:
  contents: read 
  pull-requests: write
  
on:
 ## push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Self-hosted Renovate 
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with: 
          configurationFile: .github/renovate.json
          token: ${{ secrets.RENOVATE }}
