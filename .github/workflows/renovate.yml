name: renovate
permissions:
  contents: read 
  pull-requests: write
  
on:
 ## push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Self-hosted Renovate 
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with: 
          configurationFile: .github/renovate.json
          token: ${{ secrets.RENOVATE }}
