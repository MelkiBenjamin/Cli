[tools]
# --- BUNDLE DOCKER ---
# On définit 'docker' directement. 'dockerizer' en dépend.
docker = { url = "https://download.docker.com/linux/static/stable/x86_64/docker-29.3.0.tgz", version = "29.3.0" }
dockerizer = { url = "https://github.com/MelkiBenjamin/Cli/raw/refs/heads/main/my-artifact.zip", version = "1.0.0", depends_on = ["docker"] }

# --- BUNDLE HELM ---
helm = "latest"
"aqua:arttor/helmify" = { version = "latest", depends_on = ["helm"] }

# --- BUNDLE KUBERNETES ---
kubectl = "latest"
kompose = { version = "latest", depends_on = ["kubectl"] }

# --- AUTRES ---
terraform = "latest"
k3s       = "latest"
