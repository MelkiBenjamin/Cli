[tools]
"http:dockerizer" = { version = "1.0.0", url = "https://download.docker.com/linux/static/stable/x86_64/docker-29.3.0.tgz" }
"http:docker" = { version = "29.3.0", url = "https://download.docker.com/linux/static/stable/x86_64/docker-29.3.0.tgz" }

"aqua:arttor/helmify" = "latest"
helm = { version = "latest", depends = ["aqua:arttor/helmify"] }

kubectl = { version = "latest", depends = ["kompose"] }
kompose = "latest"

terraform = "latest"
k3s       = "latest"
